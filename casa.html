<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Casos & Agenda</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary-color: #0d6efd; 
            --secondary-color: #adb5bd; 
            --background-color: #212529;
            --surface-color: #2b3035; 
            --text-color: #dee2e6; 
            --border-color: #495057;
            --card-bg: #343a40;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 20px; padding-bottom: 90px; }
        
        .container { max-width: 1200px; margin: auto; background: var(--surface-color); padding: 25px; border-radius: 8px; border: 1px solid var(--border-color); }
        
        h1 { color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 0; }

        /* --- ABAS --- */
      .tabs-nav { 
    display: flex; 
    width: 100%; 
    gap: 0; /* Remove o gap para um encaixe perfeito */
    border-bottom: 2px solid var(--border-color); 
    margin-bottom: 25px; 
}


.tab-btn { 
    flex: 1; /* Faz cada aba ocupar o mesmo espaço */
    background: none; 
    border: none; 
    color: var(--secondary-color); 
    padding: 12px 5px; /* Reduzido o padding lateral */
    cursor: pointer; 
    font-size: 0.85em; /* Fonte ligeiramente menor para não quebrar linha */
    font-weight: bold; 
    transition: 0.3s; 
    border-bottom: 3px solid transparent; 
    margin-bottom: -2px; 
    white-space: nowrap; /* Evita que o texto quebre em duas linhas */
    text-align: center;
}
        .tab-btn.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        .tab-content { display: none; min-height: 400px; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        /* --- CARDS PRINCIPAIS --- */
        .list-container { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; width: 100%; }
        .case-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .card-summary { display: flex; align-items: center; padding: 15px; cursor: pointer; position: relative; }
        .card-summary:hover { background-color: #3a4045; }
        .card-info { flex-grow: 1; }
        .card-info .case-title { font-size: 1.1em; font-weight: 600; margin: 0; color: #fff; }
        
        .card-summary::after { content: '\f107'; font-family: 'Font Awesome 6 Free'; font-weight: 900; margin-left: 15px; transition: 0.3s; color: var(--secondary-color); }
        .case-card.expanded .card-summary::after { transform: rotate(180deg); color: var(--primary-color); }
        
        #tab-anotacoes .card-summary::after { content: '\f303'; transform: none !important; color: #ffc107; }

        .card-details { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; padding: 0 20px; border-top: 1px solid transparent; }
        .case-card.expanded .card-details { max-height: 2000px; padding: 20px; border-top-color: var(--border-color); }

        /* --- MÉDICOS --- */
        .medico-item-container { display: flex; flex-direction: column; gap: 10px; }
        .medico-toggle-card { background: #2b3035; border: 1px solid #3d4248; border-radius: 6px; overflow: hidden; }
        .medico-header { display: flex; align-items: center; padding: 10px 15px; cursor: pointer; gap: 15px; }
        .medico-header:hover { background: #343a40; }
        .medico-header img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-color); pointer-events: none; }
        .medico-name { flex-grow: 1; font-weight: 600; color: #fff; }
        .medico-details-inner { display: none; padding: 15px; background: #1f2327; border-top: 1px solid #3d4248; }
        .medico-toggle-card.open .medico-details-inner { display: block; }

        .medico-info-row { display: flex; gap: 20px; align-items: flex-start; margin: 15px 0; }
        .medico-detail-photo { width: 100px; height: 100px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border-color); cursor: zoom-in; }
        .med-info-grid { display: grid; grid-template-columns: 100px 1fr; gap: 5px; flex-grow: 1; margin: 0; }
        .med-info-grid dt { color: var(--secondary-color); font-weight: bold; font-size: 0.75em; text-transform: uppercase; }
        .med-info-grid dd { margin: 0; color: #dee2e6; font-size: 0.9em; }
        .med-atuacoes-list { background: #2b3035; padding: 10px; border-radius: 4px; border-left: 3px solid var(--primary-color); margin-top: 5px; font-size: 0.85em; }

        .btn-visit-profile, .btn-note { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px; border-radius: 4px; text-decoration: none; font-size: 0.75em; font-weight: bold; margin-bottom: 10px; cursor: pointer; border: 1px solid; }
        .btn-visit-profile { background: rgba(13, 110, 253, 0.1); color: var(--primary-color); border-color: var(--primary-color); }
        .btn-note { background: rgba(255, 193, 7, 0.1); color: #ffc107; border-color: #ffc107; margin-left: 5px; }

        /* --- LIGHTBOX & MODALS --- */
        .image-modal, .modal-anotacao { display: none; position: fixed; z-index: 10002; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
        .image-modal.active, .modal-anotacao.active { display: flex; opacity: 1; }
        .image-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; transform: scale(0.8); transition: 0.3s; }
        .image-modal.active img { transform: scale(1); }
        .close-modal { position: absolute; top: 20px; right: 35px; color: #fff; font-size: 40px; cursor: pointer; }

        .modal-content { background: var(--surface-color); padding: 25px; border-radius: 8px; width: 90%; max-width: 600px; border: 1px solid var(--border-color); }
        .modal-content textarea { width: 100%; min-height: 200px; background: var(--background-color); color: var(--text-color); border: 1px solid var(--border-color); padding: 10px; border-radius: 4px; margin: 15px 0; font-family: inherit; resize: vertical; box-sizing: border-box;}
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-save-note { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .btn-cancel-note { background: var(--secondary-color); color: var(--background-color); border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }

        /* --- LOADER --- */
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--background-color); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--surface-color); border-top: 5px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loader-overlay.hidden { display: none; }
        .badge-date { background: var(--primary-color); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin-right: 10px; }
  
    </style>
</head>
<body>

    <div id="loader-overlay"><div class="spinner"></div></div>

    <div class="container">
        <!-- ABAS -->
        <div class="tabs-nav">
            <button class="tab-btn active" data-tab="meus-casos">MEUS CASOS</button>
            <button class="tab-btn" data-tab="agenda">AGENDA</button>
            <button class="tab-btn" data-tab="anotacoes">ANOTAÇÕES</button>
        </div>

        <!-- CONTEÚDO -->
        <div id="tab-meus-casos" class="tab-content active">
            <h1>Casos Ativos</h1>
            <div id="cases-list" class="list-container"></div>
        </div>

        <div id="tab-agenda" class="tab-content">
            <h1>Minha Agenda</h1>
            <div id="agenda-list" class="list-container"></div>
        </div>

        <div id="tab-anotacoes" class="tab-content">
            <h1>Minhas Anotações</h1>
            <div id="notes-list" class="list-container"></div>
        </div>
    </div>

    <!-- MODAL LIGHTBOX -->
    <div id="image-modal-overlay" class="image-modal">
        <span class="close-modal">&times;</span>
        <img id="modal-img-content" src="">
    </div>

    <!-- MODAL DE ANOTAÇÃO -->
    <div id="modal-note" class="modal-anotacao">
        <div class="modal-content">
            <h3 id="note-medico-nome">Anotação para Dr. ...</h3>
            <textarea id="note-text" placeholder="Escreva aqui a anotação rápida..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel-note" onclick="closeNoteModal()">Cancelar</button>
                <button class="btn-save-note" id="confirm-save-note">Gravar Anotação</button>
            </div>
        </div>
    </div>

    <div id="bottom-menu-placeholder"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, getDocs, query, where, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPT8jKrdXIs5Hupd13BwBwd4GxaWQrNdM",
            authDomain: "medical-5baa0.firebaseapp.com",
            projectId: "medical-5baa0",
            storageBucket: "medical-5baa0.appspot.com",
            messagingSenderId: "900547659131",
            appId: "1:900547659131:web:708f90f8fa1500d76569de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentMemberId = "";
        let selectedMedicoId = "";
        let currentNoteId = null; 
        let notesCache = {}; 

        onAuthStateChanged(auth, async user => {
            if (user) {
                const qMembro = query(collection(db, "membrosclh"), where("emails", "array-contains", user.email));
                const membroSnap = await getDocs(qMembro);
                if (membroSnap.empty) return;
                const memberDoc = membroSnap.docs[0];
                currentMemberId = memberDoc.id;
                await Promise.all([loadMyCases(memberDoc.data()), loadMyAgenda(memberDoc.id), loadMyNotes(memberDoc.id)]);
                document.getElementById('loader-overlay').classList.add('hidden');
            }
        });

        window.openNoteModal = function(medId, medNome) {
            selectedMedicoId = medId;
            const existingNote = notesCache[medId];
            if (existingNote) {
                document.getElementById('note-text').value = existingNote.text;
                currentNoteId = existingNote.id;
            } else {
                document.getElementById('note-text').value = "";
                currentNoteId = null;
            }
            document.getElementById('note-medico-nome').textContent = `Anotação: ${medNome}`;
            document.getElementById('modal-note').classList.add('active');
        }

        window.closeNoteModal = function() {
            document.getElementById('modal-note').classList.remove('active');
            currentNoteId = null;
        }

        document.getElementById('confirm-save-note').addEventListener('click', async () => {
            const text = document.getElementById('note-text').value.trim();
            if(!text) return; // Simplesmente não faz nada se estiver vazio
            
            const btn = document.getElementById('confirm-save-note');
            btn.disabled = true; // Previne cliques duplos

            try {
                if (currentNoteId) {
                    await updateDoc(doc(db, "anotacoes", currentNoteId), {
                        observacoes: text,
                        timestamp: serverTimestamp()
                    });
                } else {
                    await addDoc(collection(db, "anotacoes"), {
                        observacoes: text,
                        medico_ids: [selectedMedicoId],
                        membro_ids: [currentMemberId],
                        data: new Date().toISOString().split('T')[0],
                        timestamp: serverTimestamp()
                    });
                }
                
                closeNoteModal();
                await loadMyNotes(currentMemberId); 
            } catch(e) { 
                console.error("Erro ao guardar:", e); 
            } finally {
                btn.disabled = false;
            }
        });

        async function loadMyNotes(memberId) {
            const container = document.getElementById('notes-list');
            const qNotes = query(collection(db, "anotacoes"), where("membro_ids", "array-contains", memberId));
            const [notesSnap, medSnap] = await Promise.all([getDocs(qNotes), getDocs(collection(db, "medicos"))]);
            const medMap = new Map(medSnap.docs.map(d => [d.id, d.data().nome]));
            notesCache = {};

            if (notesSnap.empty) {
                container.innerHTML = '<p style="text-align:center; padding:40px; color:var(--secondary-color);">Não tens anotações pendentes.</p>';
                return;
            }

            container.innerHTML = notesSnap.docs.map(docSnap => {
                const n = docSnap.data();
                const noteId = docSnap.id;
                const medId = n.medico_ids?.[0];
                const medNome = medMap.get(medId) || "Médico Indefinido";
                if (medId) { notesCache[medId] = { id: noteId, text: n.observacoes }; }

                return `
                    <div class="case-card" onclick="window.location.href='master.html?edit=anotacao&id=${noteId}'" 
                         style="border-left: 4px solid #ffc107; cursor:pointer;">
                        <div class="card-summary">
                            <div class="card-info">
                                <h3 class="case-title" style="margin-bottom: 8px;">
                                    <span class="badge-date" style="background:#ffc107; color:#000;">${formatDate(n.data)}</span> 
                                    ${medNome}
                                </h3>
                                <p style="font-size:0.9em; color:var(--secondary-color); margin: 0; font-style: italic;">
                                    "${n.observacoes.substring(0,100)}${n.observacoes.length > 100 ? '...' : ''}"
                                </p>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        async function loadMyCases(memberData) {
            const container = document.getElementById('cases-list');
            const myAtuacaoIds = memberData.atuacoes_ids || [];
            if (myAtuacaoIds.length === 0) { container.innerHTML = '<p style="text-align:center; padding:40px;">Nenhum caso ativo.</p>'; return; }
            const [atuSnap, pacSnap, medSnap] = await Promise.all([getDocs(collection(db, "atuacoes")), getDocs(collection(db, "pacientes")), getDocs(collection(db, "medicos"))]);
            const atuMap = new Map(atuSnap.docs.map(d => [d.id, d.data()]));
            const pacMap = new Map(pacSnap.docs.map(d => [d.id, d.data()]));
            const medMap = new Map(medSnap.docs.map(d => [d.id, d.data()]));

            container.innerHTML = myAtuacaoIds.map(id => {
                const atu = atuMap.get(id); if (!atu) return '';
                const pac = pacMap.get(atu.paciente_ids?.[0]);
                const docs = atu.medico_ids?.map(mId => medMap.get(mId)?.nome).filter(Boolean).join(", ");
                return `
                    <div class="case-card">
                        <div class="card-summary"><div class="card-info"><h3 class="case-title">${formatDate(atu.data)} - ${pac?.nome || '...'}</h3></div></div>
                        <div class="card-details">
                            <p><strong>Paciente:</strong> ${pac?.nome_completo || 'N/A'}</p>
                            <p><strong>Médicos:</strong> ${docs || 'N/A'}</p>
                            <p><strong>Observações:</strong> ${atu.observacoes || 'Sem notas'}</p>
                        </div>
                    </div>`;
            }).join('');
        }

        async function loadMyAgenda(memberId) {
            const container = document.getElementById('agenda-list');
            const qAgenda = query(collection(db, "agenda"), where("participantes_ids", "array-contains", memberId));
            const [agendaSnap, medSnap, espSnap, atuSnap] = await Promise.all([getDocs(qAgenda), getDocs(collection(db, "medicos")), getDocs(collection(db, "especialidade")), getDocs(collection(db, "atuacoes"))]);
            const medMap = new Map(medSnap.docs.map(d => [d.id, {id: d.id, ...d.data()}]));
            const espMap = new Map(espSnap.docs.map(d => [d.id, d.data().nome]));
            const atuMap = new Map(atuSnap.docs.map(d => [d.id, d.data()]));

            container.innerHTML = agendaSnap.docs.map(doc => {
                const agenda = doc.data();
                const meds = (agenda.medico_ids || []).map(id => medMap.get(id)).filter(Boolean);
                return `
                    <div class="case-card">
                        <div class="card-summary"><div class="card-info"><h3 class="case-title"><span class="badge-date">${formatDate(agenda.data_agendada)}</span>Trabalho de Campo</h3></div></div>
                        <div class="card-details">
                            <div class="medico-item-container">
                                ${meds.map(med => {
                                    const esps = (med.especialidade_ids || []).map(id => espMap.get(id)).filter(Boolean).join(", ");
                                    const atus = (med.atuacoes_ids || []).map(id => atuMap.get(id)).filter(Boolean).sort((a,b) => b.data.localeCompare(a.data)).map(a => `<div class="med-atuacoes-list"><b>${formatDate(a.data)}</b>: ${a.observacoes}</div>`).join("");
                                    return `
                                        <div class="medico-toggle-card">
                                            <div class="medico-header" onclick="this.parentElement.classList.toggle('open')">
                                                <img src="${med.imagem_url || 'https://via.placeholder.com/45'}">
                                                <div class="medico-name">${med.nome}</div>
                                                <i class="fas fa-chevron-down"></i>
                                            </div>
                                            <div class="medico-details-inner">
                                                <a href="medico.html?id=${med.id}" class="btn-visit-profile"><i class="fas fa-external-link-alt"></i> Perfil</a>
                                                <button class="btn-note" onclick="openNoteModal('${med.id}', '${med.nome}')"><i class="fas fa-sticky-note"></i> Anotação</button>
                                                <div class="medico-info-row">
                                                    <img src="${med.imagem_url || 'https://via.placeholder.com/100'}" class="medico-detail-photo">
                                                    <dl class="med-info-grid">
                                                        <dt>Género</dt><dd>${med.genero || 'N/A'}</dd>
                                                        <dt>Especialidade</dt><dd>${esps || 'N/A'}</dd>
                                                        <dt>Última Visita</dt><dd>${med.ultimaVisita ? formatDate(med.ultimaVisita) : 'Nunca'}</dd>
                                                    </dl>
                                                </div>
                                                <strong style="font-size:0.8em; color:var(--primary-color)">HISTÓRICO</strong>
                                                ${atus || '<p>Sem registos.</p>'}
                                            </div>
                                        </div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function formatDate(ds) { if(!ds) return "---"; const p = ds.split('-'); return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : ds; }

        document.addEventListener('click', e => {
            if (e.target.classList.contains('tab-btn')) {
                document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(`tab-${e.target.dataset.tab}`).classList.add('active');
            }
            const summary = e.target.closest('.card-summary');
            if (summary && !e.target.closest('.medico-toggle-card') && !e.target.closest('#tab-anotacoes')) {
                summary.closest('.case-card').classList.toggle('expanded');
            }
            if (e.target.classList.contains('medico-detail-photo')) {
                const modal = document.getElementById('image-modal-overlay');
                document.getElementById('modal-img-content').src = e.target.src;
                modal.classList.add('active');
            }
            if (e.target.closest('.image-modal') || e.target.classList.contains('close-modal')) {
                document.getElementById('image-modal-overlay').classList.remove('active');
            }
        });
    </script>
    <script src="menu-loader.js"></script>
</body>
</html>
