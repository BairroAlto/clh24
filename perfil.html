<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Meu Perfil & Agenda</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary-color: #0d6efd;
            --primary-hover: #0b5ed7;
            --background-color: #1a1d21;
            --surface-color: #2b3035;
            --card-color: #343a40;
            --text-color: #dee2e6;
            --text-muted: #adb5bd;
            --border-color: #495057;
            --yellow-accent: #ffc107;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            background-color: var(--background-color); 
            color: var(--text-color); 
            margin: 0; padding: 20px; padding-bottom: 100px;
        }

        .container { 
            max-width: 1100px; margin: auto; 
            background: var(--surface-color); 
            padding: 30px; border-radius: 12px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Profile Header */
        .profile-header { display: flex; align-items: center; gap: 30px; margin-bottom: 40px; }
        .profile-picture { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-color); padding: 3px; }
        .profile-info h1 { margin: 0; font-size: 2.2em; letter-spacing: -0.5px; }
        .profile-info p { margin: 5px 0; color: var(--text-muted); font-size: 1.1em; }

        /* Custom Tabs Principal */
    .tabs-container { 
    display: flex; 
    width: 100%; 
    gap: 0; 
    border-bottom: 1px solid var(--border-color); 
    margin-bottom: 25px;
    box-sizing: border-box;
}

.tab-button { 
    flex: 1; 
    background: none; 
    border: none; 
    color: var(--text-muted); 
    padding: 12px 2px; 
    cursor: pointer; 
    font-size: 0.75em; /* Reduzido para caberem os 5 itens */
    font-weight: 600;
    text-transform: uppercase;
    border-bottom: 3px solid transparent; 
    transition: 0.3s;
    white-space: nowrap;
    text-align: center;
}

.tab-button:hover { color: #fff; }
.tab-button.active { 
    color: var(--primary-color); 
    border-bottom-color: var(--primary-color); 
    font-weight: bold; 
}

        /* Sub-Tabs Agenda (Style Pill) */
    .sub-tabs { 
    display: flex; 
    gap: 8px; 
    margin-bottom: 25px; 
    width: 100%;
}

.sub-tab-button { 
    flex: 1; /* Faz as duas ocuparem 50% cada */
    background: var(--background-color); 
    border: 1px solid var(--border-color); 
    color: var(--text-muted); 
    padding: 10px 5px; 
    border-radius: 8px; 
    cursor: pointer; 
    font-size: 0.85em; 
    text-align: center;
}
        .sub-tab-button.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        /* Cards e Layout */
        .agenda-card { 
            background: var(--card-color); padding: 20px; border-radius: 10px; 
            border: 1px solid var(--border-color); margin-bottom: 20px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        /* Grid de Filtros */
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.9em; color: var(--text-muted); font-weight: 600; }

        /* Inputs e Selects */
        .custom-input { 
            background: var(--background-color); border: 1px solid var(--border-color); 
            color: #fff; padding: 12px; border-radius: 6px; font-size: 1em; outline: none;
        }
        .custom-input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.2); }
        .custom-input:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Dropdowns Pesquisáveis */
      .search-select-container { 
    position: relative; 
    display: flex;
    flex-direction: column;
}

       .search-select-dropdown { 
    position: absolute; 
    top: 100%; 
    left: 0; 
    width: 100%; 
    max-height: 200px; /* Reduzido ligeiramente para não ocupar o ecrã todo no telemóvel */
    overflow-y: auto; 
    background: var(--surface-color); 
    border: 1px solid var(--border-color); 
    z-index: 10001; /* Valor muito alto para ignorar o menu inferior */
    display: none; 
    border-radius: 0 0 6px 6px; 
    box-shadow: 0 -5px 25px rgba(0,0,0,0.5), 0 10px 25px rgba(0,0,0,0.5);
}
        .search-select-dropdown.show { display: block; }
        .search-option { display: flex; align-items: center; padding: 10px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-option:hover { background: var(--primary-color); color: #fff; }
        .search-option input { margin-right: 12px; width: 16px; height: 16px; }
        .selected-badge { 
    font-size: 0.8em; 
    color: var(--yellow-accent); 
    margin-top: 4px; 
    font-weight: 500;
    display: block;
    min-height: 1em;
}

        /* Lista de Médicos */
        .medico-list { 
            background: var(--background-color); border-radius: 8px; border: 1px solid var(--border-color);
            max-height: 350px; overflow-y: auto; margin-top: 15px;
        }
        .medico-row { 
            display: flex; align-items: center; gap: 15px; padding: 12px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
        }
        .medico-row:hover { background: rgba(255,255,255,0.03); }
        .medico-row input { width: 18px; height: 18px; cursor: pointer; }

        /* Botões */
    .btn-group { 
    display: grid; 
    grid-template-columns: 1.5fr 1fr 1fr; /* O botão maior à esquerda e os pequenos à direita */
    gap: 8px; 
    margin-bottom: 15px; 
    width: 100%;
    align-items: stretch;
}

/* Div que envolve os dois botões da direita */
.right-btns {
    display: contents; /* Faz com que os botões filhos sigam a grelha do pai */
}

.btn-secondary { 
    display: flex;
    flex-direction: column; /* Ícone em cima, texto em baixo */
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 5px;
    background: #343a40; 
    color: #fff; 
    border: 1px solid var(--border-color); 
    padding: 8px 4px; 
    border-radius: 8px; 
    font-size: 0.7em; /* Texto pequeno para caber tudo */
    font-weight: 600;
    line-height: 1.2;
    min-height: 60px; /* Altura fixa para ficarem todos iguais */
}

.btn-secondary i { font-size: 1.2em; } /* Ícone um pouco maior */
        
        .btn-primary { 
            background: var(--primary-color); color: #fff; border: none; 
            padding: 12px 25px; border-radius: 6px; cursor: pointer; 
            font-size: 1.1em; font-weight: bold; width: 100%; transition: 0.2s;
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }

        /* Grid Dados Pessoais */
        .info-section { margin-bottom: 35px; }
        .info-section h3 { font-size: 1.1em; color: var(--primary-color); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .info-grid { display: grid; grid-template-columns: 200px 1fr; gap: 15px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 8px; }
        .info-grid dt { color: var(--text-muted); font-weight: 600; }
        .info-grid dd { margin: 0; font-weight: 400; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .filter-grid, .info-grid { grid-template-columns: 1fr; } }

        #loader-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: var(--background-color);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid var(--border-color);
    border-top: 5px solid var(--primary-color);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Alinhamento dos botões à direita */
.btn-group { 
    display: flex; 
    gap: 10px; 
    margin-bottom: 15px; 
    justify-content: flex-end; /* Alinhado à direita */
}

/* Container das ações da agenda */
.agenda-actions-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 15px;
    align-items: flex-start; /* Alinha pelo topo para o badge crescer para baixo */
    background: var(--card-color);
    padding: 20px;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    border-left: 4px solid var(--primary-color);
    margin-top: 25px;
    margin-bottom: 50px; /* Espaço extra no fundo para o dropdown respirar */
}

/* Padronização de altura para inputs e botões */
.agenda-actions-grid .custom-input, 
.agenda-actions-grid .btn-primary {
    height: 45px; /* Altura idêntica para todos */
    margin: 0;
    box-sizing: border-box;
    display: flex;
    align-items: center;
}

.agenda-actions-grid .btn-primary {
    justify-content: center;
    width: 100%;
}

/* Ajuste do badge "Apenas eu" para não deslocar o layout */
.selected-badge {
    position: absolute;
    bottom: -22px; /* Joga o texto para baixo da caixa */
    left: 0;
    font-size: 0.8em;
    white-space: nowrap;
}

.search-select-container {
    position: relative; /* Necessário para o posicionamento absoluto do badge */
}

/* Ajuste de responsividade */
@media (max-width: 768px) {
    .agenda-actions-grid {
        grid-template-columns: 1fr; /* Empilha em ecrãs pequenos */
        gap: 25px;
    }
    .selected-badge {
        position: static; /* Volta ao normal no telemóvel */
        margin-top: 5px;
    }
}

/* Ajuste no grupo de botões para separar o filtro da esquerda dos botões da direita */
.btn-group { 
    display: flex; 
    gap: 10px; 
    margin-bottom: 15px; 
    justify-content: space-between; /* Espaça os elementos */
    align-items: center;
}

.right-btns {
    display: flex;
    gap: 10px;
}

/* Estilo para quando o filtro "há mais tempo" está ativo */
.btn-secondary.active-filter {
    background: var(--yellow-accent);
    color: #000;
    border-color: var(--yellow-accent);
}

@media (max-width: 480px) {
    body { padding: 10px; padding-bottom: 100px; }
    .container { padding: 15px; border-radius: 0; border: none; } /* Remove bordas no mobile para ganhar espaço */
    
    .profile-header { gap: 15px; margin-bottom: 25px; }
    .profile-picture { width: 80px; height: 80px; }
    .profile-info h1 { font-size: 1.4em; }
    
    /* Grelha de botões em 2 linhas se o ecrã for muito pequeno */
    @media (max-width: 350px) {
        .btn-group { grid-template-columns: 1fr 1fr; }
        #btn-sort-oldest { grid-column: span 2; }
    }
}

/* 1. Ajuste o cabeçalho para permitir o posicionamento do botão */
.profile-header { 
    display: flex; 
    align-items: center; 
    gap: 20px; 
    margin-bottom: 30px; 
    position: relative; /* Necessário para o botão se fixar aqui */

/* 2. Estilo do novo botão pequeno no canto */
.btn-edit-profile {
    position: absolute;
    top: 0;
    right: 0;
    background: var(--card-color);
    color: var(--text-muted);
    border: 1px solid var(--border-color);
    padding: 4px 10px; /* Altura bem reduzida */
    border-radius: 6px;
    font-size: 0.7em; /* Texto pequeno e elegante */
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: 0.2s;
    text-transform: uppercase;
    font-weight: bold;
}

.btn-edit-profile:hover {
    background: var(--primary-color);
    color: #fff;
    border-color: var(--primary-color);
}

/* Ajuste mobile para o botão não sobrepor o nome */
@media (max-width: 480px) {
    .profile-header { padding-top: 30px; } /* Dá espaço para o botão no topo */
    .btn-edit-profile { top: 0; right: 0; }
}

    </style>

let editingAgendaId = null;

onAuthStateChanged(auth, async (user) => {
    if (user) {
        try {
            // Enquanto carrega, garantimos que o container está limpo
            document.getElementById('main-container').innerHTML = ""; 
            
            const q = query(collection(db, "membrosclh"), where("emails", "array-contains", user.email));
            const snap = await getDocs(q);
            if (!snap.empty) {
                await loadMyProfile(snap.docs[0].id);
            } else {
                document.getElementById('main-container').innerHTML = "<p style='text-align:center; padding:50px;'>Perfil não encontrado.</p>";
            }
        } catch (e) { 
            console.error(e); 
        } finally { 
            // SÓ AQUI o loader desaparece
            document.getElementById('loader-overlay').style.display = 'none'; 
        }
    } else { 
        window.location.href = 'index.html'; 
    }
});

async function loadMyProfile(memberId) {
    const [
        memberSnap, 
        congregacoesSnap, 
        atuacoesSnap, 
        medicosSnap, 
        todosHospitaisSnap, 
        todosMembrosSnap, 
        todasEspSnap,
        agendaSnap // Nova consulta
    ] = await Promise.all([
        getDoc(doc(db, "membrosclh", memberId)),
        getDocs(collection(db, "congregacoes")), 
        getDocs(collection(db, "atuacoes")),
        getDocs(collection(db, "medicos")),
        getDocs(collection(db, "hospitais")), 
        getDocs(collection(db, "membrosclh")),
        getDocs(collection(db, "especialidade")),
        // Busca agendas onde você é um dos participantes
        getDocs(query(collection(db, "agenda"), where("participantes_ids", "array-contains", memberId)))
    ]);

    const data = memberSnap.data();
    allMembrosCache = todosMembrosSnap.docs.map(d => ({id: d.id, nome: d.data().nome}));
    especialidadesCache = todasEspSnap.docs.map(d => ({id: d.id, nome: d.data().nome}));

    const allHospitaisList = todosHospitaisSnap.docs.map(d => ({id: d.id, ...d.data()}));

    mapsCache = {
        congregacoes: new Map(congregacoesSnap.docs.map(d => [d.id, d.data().nome])),
        atuacoes: new Map(atuacoesSnap.docs.map(d => [d.id, d.data()])),
        medicos: new Map(medicosSnap.docs.map(d => [d.id, d.data()])),
        meusHospitais: allHospitaisList.filter(h => h.responsavel_ids?.includes(memberId)),
        todosHospitais: allHospitaisList.sort((a, b) => (a.nome || "").localeCompare(b.nome || "")),
        allMedicosList: medicosSnap.docs.map(d => ({id: d.id, ...d.data()})),
        // Guardamos as agendas ordenadas pela data de criação (timestamp)
        minhasAgendas: agendaSnap.docs.map(d => ({id: d.id, ...d.data()}))
            .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0))
    };

    renderPage(data, mapsCache, memberId);
    setupTabs();
    setupAgendaLogic(memberId);
}

    // Lógica da Agenda
    function setupAgendaLogic(currentUserId) {
    const hospSelect = document.getElementById('agenda-hospital-filter');
    const espSearch = document.getElementById('esp-search');
    const espDropdown = document.getElementById('esp-dropdown');
    const shareSearch = document.getElementById('share-search');
    const shareDropdown = document.getElementById('share-dropdown');
    
    let sortByOldest = false; // Estado do novo filtro

    const handleSearchDropdown = (input, dropdown, data, selectedSet, countEl, type) => {
        if(!input) return;
        input.addEventListener('focus', () => dropdown.classList.add('show'));
        document.addEventListener('click', (e) => { if (!input.parentElement.contains(e.target)) dropdown.classList.remove('show'); });

        const render = (filter = "") => {
            const filtered = data.filter(item => item.nome.toLowerCase().includes(filter.toLowerCase()));
            dropdown.innerHTML = filtered.map(item => `
                <div class="search-option">
                    <input type="checkbox" value="${item.id}" ${selectedSet.has(item.id) ? 'checked' : ''}>
                    <span>${item.nome}</span>
                </div>
            `).join('');
            
            dropdown.querySelectorAll('.search-option').forEach(opt => {
                opt.onclick = (e) => {
                    const ck = opt.querySelector('input');
                    if (e.target !== ck) ck.checked = !ck.checked;
                    ck.checked ? selectedSet.add(ck.value) : selectedSet.delete(ck.value);
                    countEl.innerHTML = selectedSet.size > 0 ? `<i class="fas fa-check"></i> ${selectedSet.size} selecionados` : (type === 'share' ? '<i class="fas fa-user-friends"></i> Apenas eu' : '<i class="fas fa-tags"></i> 0 selecionadas');
                    if (type === 'esp') updateMedicosLista();
                };
            });
        };
        input.addEventListener('input', (e) => render(e.target.value));
        render();
    };

    handleSearchDropdown(shareSearch, shareDropdown, allMembrosCache.filter(m => m.id !== currentUserId), selectedShareIds, document.getElementById('share-count'), 'share');

    hospSelect?.addEventListener('change', () => {
        const hospId = hospSelect.value;
        espSearch.disabled = false;
        const medicosNoHosp = mapsCache.allMedicosList.filter(m => hospId === 'todos' ? true : m.posicoes?.some(p => p.hospital_id === hospId));
        const espNoHospIds = [...new Set(medicosNoHosp.flatMap(m => m.especialidade_ids || []))];
        const espNoHosp = especialidadesCache.filter(e => espNoHospIds.includes(e.id));
        handleSearchDropdown(espSearch, espDropdown, espNoHosp, selectedEspIds, document.getElementById('esp-count'), 'esp');
        updateMedicosLista();
    });

    // Função de listagem com Ordenação por últimaVisita
    function updateMedicosLista() {
        const hospId = hospSelect.value;
        let filtered = mapsCache.allMedicosList.filter(m => {
            const isAtivo = m.ativo === true || m.ativo === "sim"; 
            const matchHosp = hospId === 'todos' ? true : m.posicoes?.some(p => p.hospital_id === hospId);
            const matchEsp = selectedEspIds.size === 0 ? true : m.especialidade_ids?.some(e => selectedEspIds.has(e));
            return isAtivo && matchHosp && matchEsp;
        });

        // APLICA ORDENAÇÃO SE O FILTRO ESTIVER ATIVO
        if (sortByOldest) {
            filtered.sort((a, b) => {
                // Médicos sem data (nunca visitados) aparecem primeiro ("0000-00-00")
                const dateA = a.ultimaVisita || "0000-00-00";
                const dateB = b.ultimaVisita || "0000-00-00";
                return dateA.localeCompare(dateB);
            });
        }

        const sticky = mapsCache.allMedicosList.filter(m => selectedMedicosIds.has(m.id));
        const final = [...new Map([...filtered, ...sticky].map(m => [m.id, m])).values()];
        const lista = document.getElementById('agenda-medicos-lista');
        
        lista.innerHTML = final.length ? final.map(m => {
            const dataVisita = m.ultimaVisita ? new Date(m.ultimaVisita).toLocaleDateString('pt-PT') : 'Nunca';
            return `
                <div class="medico-row">
                    <input type="checkbox" class="medico-select-check" value="${m.id}" ${selectedMedicosIds.has(m.id) ? 'checked' : ''}>
                    <div style="flex-grow:1">
                        <b>${m.nome}</b><br>
                        <small style="color:var(--text-muted)">${m.cooperador_situacao || 'S/ Info'}</small>
                    </div>
                    <div style="text-align:right">
                        <small style="color:var(--text-muted); font-size: 0.75em;">Última Visita:</small><br>
                        <span style="font-size: 0.85em; color: ${m.ultimaVisita ? 'var(--text-color)' : 'var(--yellow-accent)'}">${dataVisita}</span>
                    </div>
                </div>
            `;
        }).join('') : '<p style="text-align:center; padding:30px; color:var(--text-muted)">Nenhum médico encontrado com estes filtros.</p>';

        lista.querySelectorAll('.medico-select-check').forEach(ck => {
            ck.onchange = () => ck.checked ? selectedMedicosIds.add(ck.value) : selectedMedicosIds.delete(ck.value);
        });
    }

    // Lógica do botão de Ordenação
    document.getElementById('btn-sort-oldest').onclick = (e) => {
        sortByOldest = !sortByOldest;
        const btn = document.getElementById('btn-sort-oldest');
        btn.classList.toggle('active-filter');
        updateMedicosLista();
    };

    document.getElementById('btn-marcar-tudo').onclick = () => {
        document.querySelectorAll('.medico-select-check').forEach(ck => { ck.checked = true; selectedMedicosIds.add(ck.value); });
    };
    document.getElementById('btn-desmarcar-tudo').onclick = () => {
        document.querySelectorAll('.medico-select-check').forEach(ck => { ck.checked = false; selectedMedicosIds.delete(ck.value); });
    };

  document.getElementById('btn-enviar-agenda').onclick = async () => {
    const date = document.getElementById('agenda-data').value;
    if (selectedMedicosIds.size === 0 || !date) return alert("Por favor, selecione médicos e uma data.");
    
    const dados = {
        medico_ids: [...selectedMedicosIds],
        participantes_ids: [currentUserId, ...selectedShareIds],
        data_agendada: date,
        timestamp: new Date()
    };

    try {
        if (editingAgendaId) {
            // MODO EDIÇÃO
            await updateDoc(doc(db, "agenda", editingAgendaId), dados);
            alert("Agenda atualizada com sucesso!");
        } else {
            // MODO NOVO
            await addDoc(collection(db, "agenda"), dados);
            alert("Agenda enviada com sucesso!");
        }
        location.reload();
    } catch (e) { 
        console.error(e);
        alert("Erro ao processar agenda."); 
    }
};

document.querySelectorAll('.sub-tab-button').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.sub-tab-button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.sub-tab-content').forEach(c => c.style.display = 'none');
        btn.classList.add('active');
        const targetId = btn.dataset.subtab;
        const targetDiv = document.getElementById(targetId);
        if(targetDiv) targetDiv.style.display = 'block';
    };
});
}

      

    // Auxiliares de Render
    function renderAtividades(ids, map) {
        if (!ids?.length) return "<p style='padding:20px; color:var(--text-muted);'>Nenhuma atividade recente registada.</p>";
        return ids.slice(0,10).map(id => {
            const it = map.get(id);
            return it ? `<div style="background:var(--card-color); padding:15px; margin-bottom:10px; border-radius:8px; border-left:4px solid var(--primary-color)"><b>${it.tipo}</b> <span style="color:var(--text-muted); font-size:0.8em;">- ${it.data}</span><br><p style="margin:5px 0 0; font-size:0.9em;">${it.observacoes || ''}</p></div>` : '';
        }).join('');
    }
    function renderHospitais(h) {
        return h.length ? `<table><thead><tr><th>Hospital</th><th>Cidade</th></tr></thead><tbody>${h.map(x => `<tr><td><b>${x.sigla || ''}</b> ${x.nome}</td><td>${x.cidade || ''}</td></tr>`).join('')}</tbody></table>` : '<p style="padding:20px; color:var(--text-muted);">Sem hospitais atribuídos.</p>';
    }
    function renderMedicos(ids, map) {
        return ids?.length ? `<table><thead><tr><th>Nome do Médico</th></tr></thead><tbody>${ids.map(id => `<tr><td>${map.get(id)?.nome || ''}</td></tr>`).join('')}</tbody></table>` : '<p style="padding:20px; color:var(--text-muted);">Sem médicos atribuídos.</p>';
    }
    function setupTabs() {
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            };
        });
    }


function renderHistoricoTrabalho(agendas, medicosMap) {
    if (!agendas || agendas.length === 0) {
        return `<p style="text-align:center; padding:40px; color:var(--text-muted);">Ainda não enviou nenhuma agenda de trabalho.</p>`;
    }

    // Função interna para formatar a data que vem do input date (AAAA-MM-DD para DD/MM/AAAA)
    const fmtDate = (ds) => { if(!ds) return "--/--/--"; const p = ds.split('-'); return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : ds; };

    return agendas.map((ag, index) => {
        // Regra: Apenas as 2 primeiras (as mais recentes por causa do sort) podem ser editadas
        const podeEditar = index < 2;
        const nomesMedicos = (ag.medico_ids || [])
            .map(id => medicosMap.get(id)?.nome || 'Médico Indefinido')
            .join(', ');

        return `
            <div class="agenda-card" style="border-left: 4px solid ${podeEditar ? 'var(--yellow-accent)' : 'var(--border-color)'}; padding: 15px; margin-bottom: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
                    <div>
                        <span style="font-size: 0.75em; color: var(--text-muted); font-weight: bold; text-transform: uppercase;">
                            <i class="fas fa-calendar-alt"></i> Visita agendada para:
                        </span>
                        <div style="font-size: 1.1em; color: #fff; font-weight: bold;">${fmtDate(ag.data_agendada)}</div>
                    </div>
               ${podeEditar ? `
    <button onclick="prepararEdicaoAgenda('${ag.id}')" class="btn-edit-profile" style="position: static; font-size: 0.65em; padding: 4px 10px; background: rgba(255, 193, 7, 0.1); color: var(--yellow-accent); border-color: var(--yellow-accent); cursor: pointer;">
        <i class="fas fa-edit"></i> EDITAR
    </button>
` : ''}
                </div>
                <div style="font-size: 0.9em; line-height: 1.4;">
                    <strong style="color: var(--primary-color);">MÉDICOS SELECIONADOS:</strong><br>
                    <span style="color: var(--text-muted);">${nomesMedicos}</span>
                </div>
            </div>
        `;
    }).join('');
}


window.prepararEdicaoAgenda = function(id) {
    editingAgendaId = id;
    const agenda = mapsCache.minhasAgendas.find(a => a.id === id);
    if (!agenda) return;

    // 1. Mudar visualmente para a aba "Preparar Trabalho"
    document.querySelector('[data-subtab="prep-trabalho"]').click();

    // 2. Preencher a Data
    document.getElementById('agenda-data').value = agenda.data_agendada;

    // 3. Resetar e Preencher Médicos Selecionados
    selectedMedicosIds.clear();
    agenda.medico_ids.forEach(mId => selectedMedicosIds.add(mId));

    // 4. Resetar e Preencher Partilha
    selectedShareIds.clear();
    (agenda.participantes_ids || []).forEach(pId => {
        if(pId !== auth.currentUser.uid) selectedShareIds.add(pId);
    });

    // 5. Atualizar Interface (Badges e Listas)
    document.getElementById('share-count').innerHTML = selectedShareIds.size > 0 ? `<i class="fas fa-check"></i> ${selectedShareIds.size} selecionados` : '<i class="fas fa-user-friends"></i> Apenas eu';
    
    // Disparar atualização da lista de médicos (pode demorar um pouco se o hospital mudar)
    // Se a agenda tiver médicos de um hospital específico, podes tentar selecionar o hospital aqui:
    // (Opcional) document.getElementById('agenda-hospital-filter').value = ...;

    // 6. Mudar o botão "Enviar" para "Atualizar"
    const btnEnvio = document.getElementById('btn-enviar-agenda');
    btnEnvio.innerHTML = '<i class="fas fa-save"></i> Atualizar Agenda';
    btnEnvio.style.background = 'var(--yellow-accent)';
    btnEnvio.style.color = '#000';

    // 7. Adicionar botão Cancelar se não existir
    if(!document.getElementById('btn-cancelar-edicao')) {
        const cancelBtn = document.createElement('button');
        cancelBtn.id = 'btn-cancelar-edicao';
        cancelBtn.className = 'btn-secondary';
        cancelBtn.style.marginTop = '10px';
        cancelBtn.style.width = '100%';
        cancelBtn.innerHTML = 'Cancelar Edição';
        cancelBtn.onclick = () => location.reload();
        btnEnvio.parentNode.appendChild(cancelBtn);
    }
    
    // Rolar para o topo do formulário
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    // Forçar atualização da lista para mostrar os médicos selecionados no topo
    const lista = document.getElementById('agenda-medicos-lista');
    if (lista) {
        // Como não sabemos o hospital original facilmente sem lógica extra, 
        // mostramos os médicos já selecionados.
        updateMedicosListaComSeleccionados();
    }
}

// Função auxiliar para garantir que os médicos em edição apareçam na lista
function updateMedicosListaComSeleccionados() {
    const final = mapsCache.allMedicosList.filter(m => selectedMedicosIds.has(m.id));
    const lista = document.getElementById('agenda-medicos-lista');
    lista.innerHTML = final.map(m => `
        <div class="medico-row">
            <input type="checkbox" class="medico-select-check" value="${m.id}" checked>
            <div style="flex-grow:1">
                <b>${m.nome}</b><br>
                <small style="color:var(--text-muted)">Modo Edição</small>
            </div>
        </div>
    `).join('');
}
